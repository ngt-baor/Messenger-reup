<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https: file:; connect-src 'self' https:; font-src 'self' data:;">
  <title>Messenger</title>
  <style>
    body, html { 
      margin: 0; padding: 0; height: 100%; overflow: hidden; 
      background: #242526; color: white; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
    }
    body.light-mode { background: #ffffff; color: #000000; }
    
    /* ===== LEFT SIDEBAR (profiles only) ===== */
    #sidebar-left { 
      position: fixed; left: 0; top: 0;
      width: 52px; height: 100%; background: #1e1e1e; border-right: 1px solid rgba(255,255,255,0.08); 
      display: flex; flex-direction: column; align-items: center; padding: 0; z-index: 100;
      transition: background 0.3s; box-sizing: border-box;
    }
    body.light-mode #sidebar-left { background: #f5f7fb; border-right: 1px solid rgba(0,0,0,0.06); }
    
    /* Scroll arrow buttons */
    .scroll-arrow {
      width: 52px; height: 28px; background: transparent; border: none; cursor: pointer;
      display: none; align-items: center; justify-content: center; color: #b0b3b8;
      transition: all 0.2s ease; flex-shrink: 0;
    }
    body.light-mode .scroll-arrow { color: #65676b; }
    .scroll-arrow:hover { background: rgba(255,255,255,0.06); color: #09f; }
    body.light-mode .scroll-arrow:hover { background: rgba(0,0,0,0.04); color: #09f; }
    .scroll-arrow svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2.5; stroke-linecap: round; }
    .scroll-arrow.visible { display: flex; }
    
    /* Scrollable profile area */
    #profiles-scroll-area {
      flex: 1; width: 100%; overflow: hidden; position: relative;
      display: flex; flex-direction: column; align-items: center;
    }
    #profiles-list {
      display: flex; flex-direction: column; align-items: center; width: 100%;
      padding: 6px 0; overflow-y: auto; flex: 1; cursor: default;
      scrollbar-width: none; /* Firefox */
    }
    #profiles-list::-webkit-scrollbar { display: none; }
    #profiles-list.dragging { cursor: grabbing; }
    
    /* Add profile button at the bottom of left sidebar */
    #btn-add-profile-wrap {
      width: 100%; display: flex; justify-content: center; padding: 8px 0; flex-shrink: 0;
      border-top: 1px solid rgba(255,255,255,0.06);
    }
    body.light-mode #btn-add-profile-wrap { border-top: 1px solid rgba(0,0,0,0.06); }
    
    /* ===== RIGHT SIDEBAR (tools) ===== */
    #sidebar-right {
      position: fixed; right: 0; top: 0;
      width: 42px; height: 100%; background: #1e1e1e; border-left: 1px solid rgba(255,255,255,0.08);
      display: flex; flex-direction: column; align-items: center; padding: 10px 0; z-index: 100;
      transition: background 0.3s; box-sizing: border-box; overflow: hidden;
    }
    body.light-mode #sidebar-right { background: #f5f7fb; border-left: 1px solid rgba(0,0,0,0.06); }
    
    .right-spacer { flex: 1; }
    
    /* ===== SHARED STYLES ===== */
    .profile-btn { 
      width: 38px; height: 38px; border-radius: 50%; margin-bottom: 8px; cursor: pointer; 
      border: 2px solid transparent; background: #3a3b3c; color: white; font-weight: bold; 
      display: flex; justify-content: center; align-items: center; font-size: 16px; position: relative; 
      transition: all 0.2s ease; flex-shrink: 0;
    }
    body.light-mode .profile-btn { background: #e4e6eb; color: #050505; }
    .profile-btn:hover { border-color: rgba(9, 153, 255, 0.5); }
    .profile-btn.active { border-color: #09f; }
    
    .badge { 
      position: absolute; top: -4px; right: -4px; background: #e74c3c; color: white; 
      border-radius: 10px; font-size: 10px; padding: 2px 5px; display: none; font-weight: bold;
    }
    
    .tool-btn { 
      width: 34px; height: 34px; border-radius: 10px; background: transparent; border: none; 
      cursor: pointer; display: flex; align-items: center; justify-content: center; 
      transition: all 0.2s ease; color: #b0b3b8; margin-bottom: 2px; padding: 0; flex-shrink: 0;
    }
    body.light-mode .tool-btn { color: #65676b; }
    .tool-btn:hover { background: rgba(255,255,255,0.08); color: #e4e6eb; }
    body.light-mode .tool-btn:hover { background: rgba(0,0,0,0.04); color: #050505; }
    
    .tool-btn svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; }
    
    .tool-separator {
      width: 24px; height: 1px; background: rgba(255,255,255,0.1); margin: 4px 0; flex-shrink: 0;
    }
    body.light-mode .tool-separator { background: rgba(0,0,0,0.08); }
    
    #btn-add-profile {
      width: 36px; height: 36px;
      border: 1px dashed rgba(255,255,255,0.4); background: transparent; color: #b0b3b8;
    }
    body.light-mode #btn-add-profile { border: 1px dashed rgba(0,0,0,0.4); color: #65676b; }
    #btn-add-profile:hover { border-color: #09f; color: #09f; background: rgba(9, 153, 255, 0.1); }
    
    /* ===== MODAL ===== */
    #modal-overlay {
      display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
      background: rgba(0,0,0,0.6); z-index: 9999; justify-content: center; align-items: center;
    }
    .modal-box {
      background: #242526; padding: 24px; border-radius: 12px; width: 300px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.4); color: white;
    }
    body.light-mode .modal-box { background: #ffffff; color: black; box-shadow: 0 4px 24px rgba(0,0,0,0.15); }

    /* ===== APP UPDATE PROGRESS ===== */
    #update-progress-overlay {
      display: none;
      position: fixed;
      inset: 0 42px 0 52px;
      z-index: 9000;
      align-items: center;
      justify-content: center;
      background: rgba(10, 10, 12, 0.72);
      backdrop-filter: blur(3px);
    }
    #update-progress-overlay.visible { display: flex; }
    .update-progress-box {
      width: min(420px, calc(100vw - 126px));
      padding: 24px;
      box-sizing: border-box;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      background: #242526;
      box-shadow: 0 18px 50px rgba(0,0,0,0.35);
    }
    body.light-mode .update-progress-box {
      color: #050505;
      border-color: rgba(0,0,0,0.1);
      background: #ffffff;
      box-shadow: 0 18px 50px rgba(0,0,0,0.16);
    }
    .update-progress-heading {
      margin: 0;
      font-size: 18px;
      font-weight: 650;
    }
    .update-progress-status {
      margin: 8px 0 20px;
      color: #b0b3b8;
      font-size: 14px;
    }
    body.light-mode .update-progress-status { color: #65676b; }
    .update-progress-row {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 8px;
    }
    .update-progress-percent {
      min-width: 48px;
      text-align: right;
      font-size: 22px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }
    .update-progress-detail {
      overflow: hidden;
      color: #b0b3b8;
      font-size: 12px;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    body.light-mode .update-progress-detail { color: #65676b; }
    .update-progress-track {
      width: 100%;
      height: 7px;
      overflow: hidden;
      border-radius: 4px;
      background: rgba(255,255,255,0.1);
    }
    body.light-mode .update-progress-track { background: rgba(0,0,0,0.1); }
    .update-progress-fill {
      width: 0;
      height: 100%;
      border-radius: inherit;
      background: #0a7cff;
      transition: width 0.2s ease;
    }
    .update-progress-track.indeterminate .update-progress-fill {
      width: 35%;
      animation: update-progress-slide 1.1s ease-in-out infinite;
    }
    .update-progress-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 20px;
    }
    .update-progress-action {
      display: none;
      min-width: 84px;
      padding: 9px 16px;
      border: 0;
      border-radius: 6px;
      color: white;
      background: #0a7cff;
      cursor: pointer;
      font-weight: 600;
    }
    .update-progress-action.secondary {
      color: #e4e6eb;
      background: #4b4c4f;
    }
    body.light-mode .update-progress-action.secondary {
      color: #050505;
      background: #e4e6eb;
    }
    .update-progress-action.visible { display: block; }
    .update-release-notes {
      display: none;
      max-height: 120px;
      margin-top: 14px;
      padding: 10px;
      overflow: auto;
      border-radius: 6px;
      color: #d7d9dd;
      background: rgba(255,255,255,0.06);
      font-size: 12px;
      line-height: 1.45;
      white-space: pre-wrap;
    }
    body.light-mode .update-release-notes {
      color: #333;
      background: rgba(0,0,0,0.05);
    }
    .update-release-notes.visible { display: block; }
    @keyframes update-progress-slide {
      from { transform: translateX(-120%); }
      to { transform: translateX(390%); }
    }
    
    .modal-input {
      width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #444; 
      background: #3a3b3c; color: white; box-sizing: border-box; outline: none; margin-bottom: 16px; margin-top: 10px;
    }
    body.light-mode .modal-input { background: #f0f2f5; border-color: #ccc; color: black; }
    
    .modal-btn { padding: 8px 16px; border-radius: 6px; border: none; cursor: pointer; font-weight: bold; }
    .modal-btn.cancel { background: #444; color: white; }
    body.light-mode .modal-btn.cancel { background: #e4e6eb; color: black; }
    .modal-btn.save { background: #0866ff; color: white; margin-left: 8px; }
    .modal-btn.logout { 
      background: transparent; color: #ffa726; border: 1px solid #ffa726; 
      width: 100%; margin-top: 12px; padding: 10px; font-size: 13px;
      transition: all 0.2s ease; display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .modal-btn.logout:hover { background: #ffa726; color: #1a1a1a; }
    .modal-btn.logout svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; }
    .modal-btn.logout.loading { opacity: 0.6; pointer-events: none; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

    /* ===== LOCK SCREEN ===== */
    #lock-screen {
      display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
      background: linear-gradient(135deg, #0a0a1a 0%, #1a1a3e 40%, #0d1b2a 100%);
      z-index: 99999; justify-content: center; align-items: center; flex-direction: column;
    }
    #lock-screen.active { display: flex; }
    .lock-container { display: flex; flex-direction: column; align-items: center; padding: 40px; }
    .lock-icon { font-size: 52px; margin-bottom: 12px; animation: lockPop 0.5s ease; }
    .lock-title { font-size: 26px; font-weight: 700; color: white; margin-bottom: 6px; letter-spacing: 1px; }
    .lock-subtitle {
      font-size: 14px; color: rgba(255,255,255,0.5); margin-bottom: 32px;
      min-height: 20px; transition: color 0.3s; text-align: center;
    }
    .lock-subtitle.error { color: #ff6b6b; }
    .lock-subtitle.success { color: #51cf66; }
    .pin-dots { display: flex; gap: 18px; margin-bottom: 36px; }
    .pin-dot {
      width: 16px; height: 16px; border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.3); background: transparent;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .pin-dot.filled {
      background: #0099ff; border-color: #0099ff;
      box-shadow: 0 0 12px rgba(0,153,255,0.5); transform: scale(1.15);
    }
    .pin-pad { display: grid; grid-template-columns: repeat(3, 72px); gap: 14px; }
    .pin-key {
      width: 72px; height: 72px; border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.12); background: rgba(255,255,255,0.06);
      color: white; font-size: 26px; font-weight: 600; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s ease; user-select: none; -webkit-app-region: no-drag;
    }
    .pin-key:hover { background: rgba(255,255,255,0.12); }
    .pin-key:active { background: rgba(0,153,255,0.25); transform: scale(0.92); }
    .pin-key:disabled { opacity: 0.3; cursor: not-allowed; }
    .pin-key-empty { visibility: hidden; pointer-events: none; }
    .pin-key-delete { font-size: 22px; }
    .pin-dots.shake { animation: shake 0.45s ease; }
    @keyframes lockPop { 0%{transform:scale(0.3);opacity:0} 60%{transform:scale(1.1)} 100%{transform:scale(1);opacity:1} }
    @keyframes shake { 0%,100%{transform:translateX(0)} 15%,45%,75%{transform:translateX(-10px)} 30%,60%,90%{transform:translateX(10px)} }
    .lock-footer { position: absolute; bottom: 24px; display: flex; gap: 20px; }
    .lock-footer-btn {
      background: transparent; border: none; color: rgba(255,255,255,0.35);
      font-size: 12px; cursor: pointer; padding: 6px 12px; border-radius: 6px;
      transition: all 0.2s;
    }
    .lock-footer-btn:hover { color: rgba(255,255,255,0.7); background: rgba(255,255,255,0.06); }

    /* Lock Settings Modal */
    #lock-settings-overlay {
      display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
      background: rgba(0,0,0,0.6); z-index: 100000; justify-content: center; align-items: center;
    }
    .lock-settings-box {
      background: #242526; padding: 24px; border-radius: 14px; width: 300px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5); color: white;
    }
    body.light-mode .lock-settings-box { background: #fff; color: #000; box-shadow: 0 8px 32px rgba(0,0,0,0.15); }
    .ls-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    body.light-mode .ls-row { border-bottom-color: rgba(0,0,0,0.06); }
    .ls-row:last-child { border-bottom: none; }
    .ls-label { font-size: 14px; }
    .ls-toggle {
      width: 44px; height: 24px; border-radius: 12px; border: none; cursor: pointer;
      background: #444; position: relative; transition: background 0.3s;
    }
    .ls-toggle.on { background: #0099ff; }
    .ls-toggle::after {
      content: ''; position: absolute; top: 2px; left: 2px;
      width: 20px; height: 20px; border-radius: 50%; background: white;
      transition: transform 0.3s;
    }
    .ls-toggle.on::after { transform: translateX(20px); }
    .ls-select {
      background: #3a3b3c; color: white; border: 1px solid #555; border-radius: 6px;
      padding: 4px 8px; font-size: 13px;
    }
    body.light-mode .ls-select { background: #f0f2f5; color: #000; border-color: #ccc; }
    .ls-btn {
      width: 100%; padding: 10px; border-radius: 8px; border: none; cursor: pointer;
      font-weight: 600; font-size: 13px; margin-top: 8px; transition: opacity 0.2s;
    }
    .ls-btn:hover { opacity: 0.85; }
    .ls-btn-primary { background: #0866ff; color: white; }
    .ls-btn-danger { background: #e74c3c; color: white; }
    .ls-btn-close { background: #444; color: white; }
    body.light-mode .ls-btn-close { background: #e4e6eb; color: #000; }

    /* ===== DOWNLOAD PANEL ===== */
    #download-panel {
      position: fixed; bottom: 16px; right: 60px; width: 360px; max-height: 420px;
      background: rgba(30,30,30,0.92); backdrop-filter: blur(18px) saturate(1.6);
      border: 1px solid rgba(255,255,255,0.1); border-radius: 16px;
      box-shadow: 0 12px 48px rgba(0,0,0,0.45), 0 0 0 1px rgba(255,255,255,0.05) inset;
      z-index: 50000; display: none; flex-direction: column; overflow: hidden;
      animation: dlPanelIn 0.3s cubic-bezier(0.16,1,0.3,1);
    }
    body.light-mode #download-panel {
      background: rgba(255,255,255,0.95); border-color: rgba(0,0,0,0.08);
      box-shadow: 0 12px 48px rgba(0,0,0,0.12);
    }
    @keyframes dlPanelIn { from { opacity:0; transform:translateY(20px) scale(0.96); } to { opacity:1; transform:translateY(0) scale(1); } }

    .dl-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 16px; border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    body.light-mode .dl-header { border-bottom-color: rgba(0,0,0,0.06); }
    .dl-header-title { font-size: 14px; font-weight: 700; color: #e4e6eb; display: flex; align-items: center; gap: 8px; }
    body.light-mode .dl-header-title { color: #1c1e21; }
    .dl-header-title svg { width: 18px; height: 18px; stroke: #0099ff; fill: none; stroke-width: 2; }
    .dl-header-count { font-size: 11px; background: #0099ff; color: white; border-radius: 10px; padding: 1px 7px; font-weight: 600; }
    .dl-close-btn {
      width: 28px; height: 28px; border-radius: 8px; border: none; cursor: pointer;
      background: transparent; color: #b0b3b8; display: flex; align-items: center; justify-content: center; transition: all 0.2s;
    }
    .dl-close-btn:hover { background: rgba(255,255,255,0.08); color: #e4e6eb; }
    body.light-mode .dl-close-btn { color: #65676b; }
    body.light-mode .dl-close-btn:hover { background: rgba(0,0,0,0.05); color: #1c1e21; }

    .dl-list { overflow-y: auto; max-height: 340px; padding: 6px 0; scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.1) transparent; }
    .dl-list::-webkit-scrollbar { width: 4px; }
    .dl-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 4px; }

    .dl-item {
      display: flex; align-items: center; gap: 12px; padding: 10px 16px;
      transition: background 0.15s; cursor: default; position: relative;
    }
    .dl-item:hover { background: rgba(255,255,255,0.04); }
    body.light-mode .dl-item:hover { background: rgba(0,0,0,0.03); }

    .dl-icon {
      width: 40px; height: 40px; border-radius: 10px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 700;
      background: linear-gradient(135deg, #0066ff22, #0099ff33);
      border: 1px solid rgba(0,153,255,0.15);
    }
    .dl-icon.dl-done { background: linear-gradient(135deg, #00b85622, #51cf6633); border-color: rgba(81,207,102,0.2); }
    .dl-icon.dl-error { background: linear-gradient(135deg, #e74c3c22, #ff6b6b33); border-color: rgba(255,107,107,0.2); }

    .dl-info { flex: 1; min-width: 0; }
    .dl-filename {
      font-size: 13px; font-weight: 600; color: #e4e6eb; white-space: nowrap;
      overflow: hidden; text-overflow: ellipsis;
    }
    body.light-mode .dl-filename { color: #1c1e21; }
    .dl-meta { font-size: 11px; color: #8a8d91; margin-top: 3px; display: flex; align-items: center; gap: 6px; }

    .dl-progress-bar {
      width: 100%; height: 3px; background: rgba(255,255,255,0.06); border-radius: 2px;
      margin-top: 6px; overflow: hidden;
    }
    body.light-mode .dl-progress-bar { background: rgba(0,0,0,0.06); }
    .dl-progress-fill {
      height: 100%; background: linear-gradient(90deg, #0066ff, #0099ff); border-radius: 2px;
      transition: width 0.3s ease; position: relative;
    }
    .dl-progress-fill::after {
      content: ''; position: absolute; right: 0; top: 0; width: 20px; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3)); border-radius: 2px;
      animation: dlShine 1.5s infinite;
    }
    @keyframes dlShine { 0%,100% { opacity:0.3; } 50% { opacity:1; } }

    .dl-actions { display: flex; gap: 4px; flex-shrink: 0; }
    .dl-action-btn {
      width: 28px; height: 28px; border-radius: 8px; border: none; cursor: pointer;
      background: transparent; color: #b0b3b8; display: flex; align-items: center; justify-content: center;
      transition: all 0.2s; opacity: 0;
    }
    .dl-item:hover .dl-action-btn { opacity: 1; }
    .dl-action-btn:hover { background: rgba(255,255,255,0.1); color: #e4e6eb; }
    body.light-mode .dl-action-btn:hover { background: rgba(0,0,0,0.06); color: #1c1e21; }
    .dl-action-btn svg { width: 15px; height: 15px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; }

    .dl-empty { text-align: center; padding: 32px 16px; color: #65676b; font-size: 13px; }
    .dl-empty svg { width: 40px; height: 40px; stroke: #444; fill: none; stroke-width: 1.5; margin-bottom: 8px; }
    body.light-mode .dl-empty svg { stroke: #ccc; }

    /* Download toast notification */
    .dl-toast {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(80px);
      background: rgba(30,30,30,0.95); backdrop-filter: blur(12px); color: #e4e6eb;
      padding: 10px 20px; border-radius: 10px; font-size: 13px; font-weight: 500; z-index: 99999;
      border: 1px solid rgba(255,255,255,0.08); box-shadow: 0 8px 24px rgba(0,0,0,0.3);
      opacity: 0; transition: all 0.4s cubic-bezier(0.16,1,0.3,1); pointer-events: none;
      display: flex; align-items: center; gap: 8px;
    }
    body.light-mode .dl-toast { background: rgba(255,255,255,0.95); color: #1c1e21; border-color: rgba(0,0,0,0.08); }
    .dl-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body class="dark-mode">
  <!-- LEFT SIDEBAR: Profiles -->
  <div id="sidebar-left">
    <button class="scroll-arrow" id="scroll-up" title="Cuộn lên">
      <svg viewBox="0 0 24 24"><polyline points="18 15 12 9 6 15"/></svg>
    </button>
    
    <div id="profiles-scroll-area">
      <div id="profiles-list">
        <!-- Profile avatars injected by JS -->
      </div>
    </div>
    
    <button class="scroll-arrow" id="scroll-down" title="Cuộn xuống">
      <svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
    </button>
    
    <div id="btn-add-profile-wrap">
      <button class="profile-btn" id="btn-add-profile" title="Thêm tài khoản Messenger mới">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>
    </div>
  </div>
  
  <!-- RIGHT SIDEBAR: Tools -->
  <div id="sidebar-right">
    <button class="tool-btn" id="btn-home" title="Trang chủ Messenger">
      <svg viewBox="0 0 24 24" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    </button>
    <button class="tool-btn" id="btn-back" title="Quay lại">
      <svg viewBox="0 0 24 24" stroke-linejoin="round"><path d="M19 12H5"/><polyline points="12 19 5 12 12 5"/></svg>
    </button>
    
    <div class="tool-separator"></div>
    
    <button class="tool-btn" id="btn-reload" title="Tải lại trang">
      <svg viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
    </button>
    <button class="tool-btn" id="btn-zoom-in" title="Phóng to">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
    </button>
    <button class="tool-btn" id="btn-zoom-out" title="Thu nhỏ">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
    </button>
    
    <div class="right-spacer"></div>

    <button class="tool-btn" id="btn-settings" title="Cài đặt" aria-label="Cài đặt">
      <svg viewBox="0 0 24 24"><path d="M20 7h-9"/><path d="M14 17H4"/><circle cx="7" cy="7" r="3"/><circle cx="17" cy="17" r="3"/></svg>
    </button>
    <button class="tool-btn" id="btn-dark-mode" title="Chế độ tối/sáng">
      <svg id="icon-moon" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      <svg id="icon-sun" style="display:none;" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
    </button>
    <button class="tool-btn" id="btn-fs" title="Toàn màn hình">
      <svg viewBox="0 0 24 24"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>
    </button>
    <button class="tool-btn" id="btn-pin" title="Ghim cửa sổ">
      <svg viewBox="0 0 24 24"><path d="M12 17v5"/><path d="M9 10.76a2 2 0 0 1-1.11 1.79l-1.78.9A2 2 0 0 0 5 15.24V17h14v-1.76a2 2 0 0 0-1.11-1.79l-1.78-.9A2 2 0 0 1 15 10.76V6a1 1 0 0 1 1-1h.5a.5.5 0 0 0 .5-.5v-1a.5.5 0 0 0-.5-.5h-9a.5.5 0 0 0-.5.5v1a.5.5 0 0 0 .5.5H8a1 1 0 0 1 1 1z"/></svg>
    </button>
    <button class="tool-btn" id="btn-lock" title="Khoá ứng dụng (Click phải → Cài đặt)">
      <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/><circle cx="12" cy="16" r="1"/></svg>
    </button>
    
    <div class="tool-separator"></div>
    
    <button class="tool-btn" id="btn-download" title="Tải xuống">
      <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    </button>
    <button class="tool-btn" id="btn-j2team" title="J2TEAM Security — Cài Extension bảo mật">
      <svg viewBox="0 0 24 24" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><polyline points="9 12 11 14 15 10"/></svg>
    </button>
  </div>
  
  <!-- UPDATE PROGRESS -->
  <div id="update-progress-overlay" aria-hidden="true">
    <section class="update-progress-box" role="status" aria-live="polite">
      <h2 class="update-progress-heading" id="update-progress-heading">Đang cập nhật Messenger</h2>
      <p class="update-progress-status" id="update-progress-status">Đang chuẩn bị tải bản cập nhật...</p>
      <div class="update-progress-row">
        <div class="update-progress-detail" id="update-progress-detail">Đang kết nối...</div>
        <div class="update-progress-percent" id="update-progress-percent">0%</div>
      </div>
      <div class="update-progress-track" id="update-progress-track">
        <div class="update-progress-fill" id="update-progress-fill"></div>
      </div>
      <div class="update-release-notes" id="update-release-notes"></div>
      <div class="update-progress-actions">
        <button class="update-progress-action secondary" id="update-install-later" type="button">Cài sau</button>
        <button class="update-progress-action" id="update-install-now" type="button">Cài ngay</button>
        <button class="update-progress-action" id="update-progress-close" type="button">Đóng</button>
      </div>
    </section>
  </div>

  <!-- MODAL -->
  <div id="modal-overlay">
    <div class="modal-box">
      <h3 id="modal-title" style="margin-top:0;">Thêm tài khoản</h3>
      <div style="display:flex; align-items:center; gap:12px; margin-top:16px;">
        <div id="avatar-preview" style="width:56px; height:56px; border-radius:50%; background:#3a3b3c; cursor:pointer; display:flex; justify-content:center; align-items:center; overflow:hidden; border:2px solid transparent;">
          <span id="avatar-letter" style="font-size:24px; font-weight:bold;">+</span>
          <img id="avatar-img" style="width:100%; height:100%; object-fit:cover; display:none;" />
        </div>
        <div id="avatar-picker-text" style="font-size:13px; color:#aaa; cursor:pointer;">Chọn ảnh đại diện<br/>(Tùy chọn)</div>
        <input type="file" id="avatar-input" accept="image/*" style="display:none;" />
      </div>
      <input type="text" id="profile-name-input" class="modal-input" placeholder="Nhập tên hiển thị (VD: Nick Clone)" />
      <div style="display:flex; justify-content:space-between; align-items:center;">
        <button class="modal-btn cancel" id="modal-delete" style="background:#e74c3c; color:white; display:none;">Xóa</button>
        <div style="margin-left:auto;">
          <button class="modal-btn cancel" id="modal-cancel">Hủy</button>
          <button class="modal-btn save" id="modal-save">Lưu</button>
        </div>
      </div>
      <button class="modal-btn logout" id="modal-logout" style="display:none;" title="Đăng xuất tài khoản hiện tại và đăng nhập lại">
        <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Đăng xuất & Đăng nhập lại
      </button>
    </div>
  </div>

  <!-- LOCK SCREEN -->
  <div id="lock-screen">
    <div class="lock-container">
      <div class="lock-title">Messenger</div>
      <div class="lock-subtitle" id="lock-message">Nhập mã PIN để mở khoá</div>
      <div class="pin-dots" id="pin-dots">
        <span class="pin-dot"></span>
        <span class="pin-dot"></span>
        <span class="pin-dot"></span>
        <span class="pin-dot"></span>
      </div>
      <div class="pin-pad">
        <button class="pin-key" data-key="1">1</button>
        <button class="pin-key" data-key="2">2</button>
        <button class="pin-key" data-key="3">3</button>
        <button class="pin-key" data-key="4">4</button>
        <button class="pin-key" data-key="5">5</button>
        <button class="pin-key" data-key="6">6</button>
        <button class="pin-key" data-key="7">7</button>
        <button class="pin-key" data-key="8">8</button>
        <button class="pin-key" data-key="9">9</button>
        <button class="pin-key pin-key-empty"></button>
        <button class="pin-key" data-key="0">0</button>
        <button class="pin-key pin-key-delete" data-key="delete">⌫</button>
      </div>
    </div>
    <div class="lock-footer">
      <button class="lock-footer-btn" id="lock-disable-btn" style="display:none;">Tắt khoá ứng dụng</button>
    </div>
  </div>

  <!-- LOCK SETTINGS MODAL -->
  <div id="lock-settings-overlay">
    <div class="lock-settings-box">
      <h3 style="margin-top:0;">Cài đặt khoá</h3>
      <div class="ls-row">
        <span class="ls-label">Khoá ứng dụng</span>
        <button class="ls-toggle" id="ls-toggle-lock"></button>
      </div>
      <div class="ls-row">
        <span class="ls-label">Tự động khoá sau</span>
        <select class="ls-select" id="ls-timeout">
          <option value="0">Chỉ khi mở app</option>
          <option value="1">1 phút</option>
          <option value="3">3 phút</option>
          <option value="5" selected>5 phút</option>
          <option value="10">10 phút</option>
          <option value="30">30 phút</option>
        </select>
      </div>
      <button class="ls-btn ls-btn-primary" id="ls-change-pin" style="display:none;">Đổi mã PIN</button>
      <button class="ls-btn ls-btn-danger" id="ls-remove-pin" style="display:none;">Xoá mã PIN</button>
      <button class="ls-btn ls-btn-close" id="ls-close">Đóng</button>
    </div>
  </div>
  
  <!-- DOWNLOAD PANEL -->
  <div id="download-panel">
    <div class="dl-header">
      <div class="dl-header-title">
        <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Tải xuống
        <span class="dl-header-count" id="dl-count">0</span>
      </div>
      <button class="dl-close-btn" id="dl-close" title="Đóng">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="dl-list" id="dl-list">
      <div class="dl-empty" id="dl-empty">
        <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        <div>Chưa có tải xuống nào</div>
      </div>
    </div>
  </div>

  <!-- DOWNLOAD TOAST -->
  <div class="dl-toast" id="dl-toast"></div>

  <script src="renderer.js"></script>
</body>
</html>
